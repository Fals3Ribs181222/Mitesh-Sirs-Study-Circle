<form id="addStudentForm">
    <div class="form__group">
        <label class="form__label" for="studentName">Student Full Name</label>
        <input type="text" id="studentName" class="form__control" required placeholder="e.g. Rahul Sharma">
    </div>

    <div class="form__group">
        <label class="form__label" for="studentGrade">Grade</label>
        <select id="studentGrade" class="form__control" required>
            <option value="">-- Select Grade --</option>
            <option value="11th">11th</option>
            <option value="12th">12th</option>
        </select>
    </div>

    <div class="form__group">
        <label class="form__label">Subjects</label>
        <div class="form__checkbox-group">
            <label class="form__checkbox-label">
                <input type="checkbox" name="studentSubjects" value="Accounts" class="form__checkbox">
                Accounts
            </label>
            <label class="form__checkbox-label">
                <input type="checkbox" name="studentSubjects" value="Commerce" class="form__checkbox">
                Commerce
            </label>
        </div>
    </div>

    <div class="form__group form__toggle">
        <label class="form__toggle-label">
            <input type="checkbox" id="autoGenerateCheckbox" checked class="form__checkbox">
            Auto-generate Username &amp; Password
        </label>
        <p class="form__toggle-hint">
            Automatically generates a standard, secure Username (e.g. rahul.s123) and Password. Uncheck to provide
            custom credentials.
        </p>
    </div>

    <div id="customCredentialsFields" class="form__custom-fields">
        <div class="form__group">
            <label class="form__label" for="studentUsername">Custom Username</label>
            <input type="text" id="studentUsername" class="form__control" placeholder="e.g. rahul.sharma">
        </div>
        <div class="form__group">
            <label class="form__label" for="studentPassword">Custom Password</label>
            <input type="text" id="studentPassword" class="form__control" placeholder="Enter secure password">
        </div>
    </div>

    <button type="submit" class="btn btn--primary btn--full" id="btnAddStudent">Register Student</button>
    <div id="addStudentStatus" class="status"></div>
</form>
